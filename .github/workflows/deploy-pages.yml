name: Validate

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "validate"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Install worker dependencies
        run: npm --prefix apps/communications-worker ci

      - name: Check tooling integrity
        run: npm run check:tooling-integrity

      - name: Build site
        run: npm run build

      - name: Lint HTML
        run: npm run lint:html

      - name: Check links
        run: npm run check:links

      - name: Check a11y
        run: npm run check:a11y

      - name: Test worker
        run: npm run test:worker

      - name: Audit dependencies
        run: npm run check:audit

  deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Build site
        run: npm --prefix apps/web run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4.94.0"
          command: pages deploy apps/web/dist --project-name=stexpedite-press --commit-dirty=true
