name: Validate

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "validate"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install root dependencies
        run: npm install

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Install worker dependencies
        run: npm --prefix apps/communications-worker install

      - name: Check tooling integrity
        run: npm run check:tooling-integrity

      - name: Build site
        run: npm run build

      - name: Lint HTML
        run: npm run lint:html

      - name: Check links
        run: npm run check:links

      - name: Check a11y
        run: npm run check:a11y

      - name: Test worker
        run: npm run test:worker

  deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Build site
        run: npm --prefix apps/web run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: npx wrangler pages deploy apps/web/dist --project-name stexpedite-press --commit-dirty=true
