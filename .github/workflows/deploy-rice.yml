name: Deploy RICE

on:
  push:
    branches: [main]
    paths:
      - "apps/rice/**"
      - ".github/workflows/deploy-rice.yml"
  workflow_dispatch:

concurrency:
  group: deploy-rice
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: python -m pip install Pillow

      - name: Build RICE static site
        working-directory: apps/rice
        run: |
          python scripts/build_responsive_images.py
          python scripts/check_assets.py
          python scripts/build_public_site.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy apps/rice/_site --project-name=rice-magazine --branch=main --commit-dirty=true
