name: API Health Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  api-runtime-check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe health and API route behavior
        run: |
          set -euo pipefail

          run_probe() {
            name="$1"
            expected_codes="$2"
            expected_pattern="$3"
            output_file="$4"
            shift 4

            status_code="$(curl -sS -o "$output_file" -w "%{http_code}" "$@")"
            body="$(cat "$output_file")"

            echo "[$name] status: $status_code"
            echo "[$name] body: $body"

            status_ok=1
            for expected_code in $expected_codes; do
              if [ "$status_code" = "$expected_code" ]; then
                status_ok=0
                break
              fi
            done

            if [ "$status_ok" -ne 0 ]; then
              echo "[$name] unexpected status. Expected one of: $expected_codes" >&2
              exit 1
            fi

            if ! grep -q "$expected_pattern" "$output_file"; then
              echo "[$name] response body did not match expected pattern: $expected_pattern" >&2
              exit 1
            fi
          }

          run_probe \
            "health" \
            "200" \
            '"ok":true' \
            /tmp/health.json \
            https://stexpedite.press/api/health

          run_probe \
            "storefront" \
            "200" \
            '"ok":true' \
            /tmp/storefront.json \
            https://stexpedite.press/api/storefront

          run_probe \
            "projects" \
            "200" \
            '"ok":true' \
            /tmp/projects.json \
            https://stexpedite.press/api/projects

          run_probe \
            "updates" \
            "400" \
            '"ok":false' \
            /tmp/updates.json \
            -X POST https://stexpedite.press/api/updates \
            -H "content-type: application/json" \
            --data '{"email":"","source":"monitor"}'

          run_probe \
            "contact" \
            "400 500" \
            '"ok":false' \
            /tmp/contact.json \
            -X POST https://stexpedite.press/api/contact \
            -H "content-type: application/json" \
            --data '{"email":"","message":""}'

          run_probe \
            "submit" \
            "400 500" \
            '"ok":false' \
            /tmp/submit.json \
            -X POST https://stexpedite.press/api/submit \
            -H "content-type: application/json" \
            --data '{"email":"","note":""}'
