<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICE &ndash; Pre-Order</title>
  <meta name="description" content="RICE is a literary magazine of essays, fiction, poetry, and archival work from the Gulf South.">
  <meta name="theme-color" content="#171008">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <script src="site.js" defer></script>
</head>
<body class="splash">
  <video class="splash-video" autoplay muted loop playsinline preload="metadata" poster="images/rice_field.png" aria-hidden="true">
    <source src="images/rice-field-loop.mp4" type="video/mp4">
  </video>
  <main class="splash-container">
    <h1>RICE</h1>
    <p class="splash-tagline">29.9511&deg; N, 90.0715&deg; W</p>
    <div class="splash-actions">
      <a href="shop.html" class="splash-btn">Pre-Order</a>
      <a href="submissions.html" class="splash-btn secondary">Submit</a>
    </div>
    <form class="splash-signup signup-form">
      <label class="visually-hidden" for="splash-email">Email address</label>
      <div class="splash-signup-row">
        <input id="splash-email" name="email" type="email" autocomplete="email" placeholder="EMAIL ADDRESS" required>
        <button type="submit">Sign Up</button>
      </div>
      <p class="form-status" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
